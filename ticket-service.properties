spring.application.name=ticket-service
spring.config.import=optional:configserver:http://localhost:8888

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/flightticketdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Welcome@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Kafka
spring.kafka.bootstrap-servers=127.0.0.1:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# Server
server.port=8082

# Timeouts
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.initialization-fail-timeout=1

# Logging
logging.level.root=INFO
logging.level.com.flightapp=DEBUG
logging.level.org.springframework.boot.autoconfigure=DEBUG
